services:
  backend:
    build:
      context: ./backend
    container_name: food_ordering_backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: food_ordering_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
